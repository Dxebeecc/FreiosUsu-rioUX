<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo de Ferramentas Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração de Cores Customizadas (Inspirado no Degradê LATAM) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        latam: {
                            blue: '#1B1464',
                            purple: '#7B2068',
                            pink: '#E3004F',
                            bg: '#0A0F1C',
                            surface: '#131A2D',
                            border: '#232D45'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0A0F1C; }
        ::-webkit-scrollbar-thumb { background: #232D45; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #7B2068; }
        [x-cloak] { display: none !important; }
        
        .glass-panel {
            background: rgba(19, 26, 45, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .tile-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .tile-hover:hover { transform: translateY(-2px); border-color: #7B2068; background-color: rgba(35, 45, 69, 0.8); }
        
        .list-item-hover { transition: all 0.2s ease; }
        .list-item-hover:hover { background-color: rgba(255, 255, 255, 0.03); border-color: #7B2068; }
    </style>
</head>
<body class="bg-latam-bg text-gray-200 font-sans antialiased min-h-screen flex flex-col selection:bg-latam-pink selection:text-white" x-data="setupApp()">

    <!-- Header Fixo estilo App -->
    <header class="glass-panel sticky top-0 z-40 border-b border-latam-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-latam-blue via-latam-purple to-latam-pink flex items-center justify-center shadow-lg shadow-latam-purple/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">Acervo de Ferramentas</h1>
                    <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold bg-clip-text text-transparent bg-gradient-to-r from-latam-purple to-latam-pink">Gestão de Inventário</p>
                </div>
            </div>
            
            <!-- Barra de Pesquisa Refinada -->
            <div class="relative w-full md:w-[400px]">
                <input type="text" x-model="searchQuery" placeholder="Buscar ferramenta ou P/N..." 
                       class="w-full bg-latam-bg border border-latam-border rounded-full py-2.5 px-5 pl-11 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-latam-purple focus:ring-1 focus:ring-latam-purple transition-all">
                <svg class="w-4 h-4 absolute left-4 top-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <button x-show="isSearching" @click="searchQuery = ''" class="absolute right-2 top-2 text-gray-400 hover:text-white bg-latam-surface rounded-full p-1.5 transition-colors">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full flex-grow">
        
        <!-- Breadcrumbs Estilo Pills com blindagem de navegação -->
        <div x-cloak x-show="!isLoading && !isSearching" class="mb-6 flex items-center space-x-1 overflow-x-auto pb-2 scrollbar-hide text-xs font-semibold uppercase tracking-wider">
            <button @click="goToLevel(0)" class="flex items-center px-3 py-1.5 rounded-full bg-latam-surface border border-latam-border text-gray-400 hover:text-white hover:border-latam-purple transition-colors whitespace-nowrap">
                Início
            </button>
            
            <template x-if="selectedCat">
                <div class="flex items-center">
                    <svg class="w-4 h-4 text-gray-600 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <!-- Ao clicar aqui, ele reseta o selectedLoc e selectedSub automaticamente -->
                    <button @click="goToLevel(1, selectedCat)" class="px-3 py-1.5 rounded-full bg-latam-surface border border-latam-border text-gray-400 hover:text-white hover:border-latam-purple transition-colors whitespace-nowrap" x-text="selectedCat"></button>
                </div>
            </template>
            
            <template x-if="selectedLoc">
                <div class="flex items-center">
                    <svg class="w-4 h-4 text-gray-600 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <button @click="goToLevel(2, selectedCat, selectedLoc)" class="px-3 py-1.5 rounded-full bg-latam-surface border border-latam-border text-gray-400 hover:text-white hover:border-latam-purple transition-colors whitespace-nowrap" x-text="selectedLoc"></button>
                </div>
            </template>
            
            <template x-if="selectedSub">
                <div class="flex items-center">
                    <svg class="w-4 h-4 text-gray-600 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <span class="px-3 py-1.5 rounded-full bg-gradient-to-r from-latam-purple/20 to-latam-pink/20 border border-latam-pink/30 text-latam-pink whitespace-nowrap" x-text="selectedSub"></span>
                </div>
            </template>

            <!-- Trilha exclusiva para a visualização de Check/Procedimento -->
            <template x-if="activeCheck">
                <div class="flex items-center">
                    <svg class="w-4 h-4 text-gray-600 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <span class="px-3 py-1.5 rounded-full bg-gradient-to-r from-latam-purple/20 to-latam-pink/20 border border-latam-pink/30 text-white whitespace-nowrap flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5 text-latam-pink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Procedimento: <span class="font-bold text-latam-pink ml-1" x-text="activeCheck"></span>
                    </span>
                </div>
            </template>
        </div>

        <!-- Banner de Busca -->
        <div x-cloak x-show="isSearching" class="mb-6 bg-gradient-to-r from-latam-blue/30 to-latam-purple/30 border border-latam-purple/40 p-4 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-3 shadow-lg">
            <span class="text-gray-300 text-sm">
                Buscando por: <span class="text-white font-bold text-base" x-text="searchQuery"></span>
            </span>
            <span class="text-xs font-bold bg-latam-pink text-white px-3 py-1.5 rounded-full shadow-md uppercase tracking-wider" x-text="searchResults.length + ' resultados'"></span>
        </div>

        <!-- Indicador de Carregamento -->
        <div x-show="isLoading" class="flex flex-col items-center justify-center py-32">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-latam-pink mb-4"></div>
            <p class="text-gray-400 text-sm uppercase tracking-widest font-semibold animate-pulse">Sincronizando Banco de Dados</p>
        </div>

        <!-- ========================================== -->
        <!-- NÍVEL 0: TELA INICIAL (Categorias + Checks)-->
        <!-- ========================================== -->
        <div x-cloak x-show="!isLoading && !isSearching && level === 0" x-transition.opacity>
            
            <!-- Seção 1: Inventário Físico -->
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 pl-1">Explorar Inventário</h3>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-8">
                <template x-for="cat in categories" :key="cat">
                    <div @click="goToLevel(1, cat)" class="tile-hover glass-panel rounded-2xl p-4 flex items-center gap-4 group">
                        <div class="p-3 rounded-xl bg-latam-bg border border-latam-border group-hover:border-latam-purple/50 text-gray-400 group-hover:text-latam-pink transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h2 class="text-sm font-bold text-gray-200 capitalize truncate group-hover:text-white" x-text="cat"></h2>
                            <p class="text-[10px] uppercase tracking-wider text-gray-500 mt-0.5">Categorias</p>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Seção 2: Kits por Procedimento (Só aparece se houver Checks cadastrados na planilha) -->
            <template x-if="uniqueChecks.length > 0">
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 pl-1">Kits por Procedimento</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        <template x-for="check in uniqueChecks" :key="check">
                            <div @click="goToCheck(check)" class="tile-hover glass-panel rounded-2xl p-4 flex items-center gap-4 group border-latam-purple/30 relative overflow-hidden">
                                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-latam-purple to-latam-pink opacity-80"></div>
                                <div class="p-3 rounded-xl bg-gradient-to-br from-latam-purple/20 to-latam-pink/20 border border-latam-pink/30 text-latam-pink group-hover:text-white transition-colors">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h2 class="text-sm font-bold text-gray-100 truncate group-hover:text-white" x-text="check"></h2>
                                    <p class="text-[10px] uppercase tracking-wider text-latam-pink/80 font-bold mt-0.5">Abrir Kit</p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <!-- NÍVEL 1: PASTAS DOS MÓVEIS (Containers) -->
        <div x-cloak x-show="!isLoading && !isSearching && level === 1" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" x-transition.opacity>
            <template x-for="loc in locations" :key="loc">
                <div @click="goToLevel(2, selectedCat, loc)" class="tile-hover glass-panel rounded-2xl p-4 flex items-center gap-4 group relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-latam-purple to-latam-pink opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="p-3 rounded-xl bg-latam-bg border border-latam-border text-gray-400 group-hover:text-latam-purple transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h2 class="text-sm font-bold text-gray-200 truncate group-hover:text-white" x-text="loc"></h2>
                        <p class="text-[10px] uppercase tracking-wider text-gray-500 mt-0.5">Móvel</p>
                    </div>
                </div>
            </template>
        </div>

        <!-- NÍVEL 2: PASTAS DAS GAVETAS / PRATELEIRAS (Sub-containers) -->
        <div x-cloak x-show="!isLoading && !isSearching && level === 2" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" x-transition.opacity>
            <template x-for="sub in subLocations" :key="sub">
                <div @click="goToLevel(3, selectedCat, selectedLoc, sub)" class="tile-hover glass-panel rounded-2xl p-4 flex items-center gap-4 group">
                    <div class="p-2.5 rounded-lg bg-latam-bg border border-latam-border text-gray-500 group-hover:text-latam-pink transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h2 class="text-sm font-bold text-gray-200 truncate group-hover:text-white" x-text="sub"></h2>
                        <p class="text-[10px] uppercase tracking-wider text-latam-pink/80 font-bold mt-0.5">Abrir</p>
                    </div>
                </div>
            </template>
        </div>

        <!-- NÍVEL 3 (E CHECK VIEW): LISTA COMPACTA DE FERRAMENTAS -->
        <div x-cloak x-show="!isLoading && (isSearching || level === 3 || level === 'check_view')" class="flex flex-col gap-3" x-transition.opacity>
            <template x-for="tool in (isSearching ? searchResults : (level === 'check_view' ? toolsInCheck : toolsInSubLocation))" :key="tool.id">
                
                <!-- Item da Lista (Estilo Finanças Pro) -->
                <div class="list-item-hover glass-panel rounded-2xl p-3 flex flex-col sm:flex-row sm:items-center gap-4 relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-latam-purple to-latam-pink opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    
                    <!-- Thumbnail Imagem Interativa (Abre Modal) -->
                    <div @click="tool.img ? openImageModal(tool.img, tool.name) : null"
                         :class="tool.img ? 'cursor-zoom-in hover:border-latam-pink/50' : ''"
                         class="w-16 h-16 sm:w-20 sm:h-20 flex-shrink-0 bg-latam-bg rounded-xl overflow-hidden flex items-center justify-center border border-latam-border relative shadow-inner transition-colors">
                        <template x-if="tool.img">
                            <img :src="tool.img" class="w-full h-full object-contain p-1 mix-blend-screen group-hover:scale-105 transition-transform duration-300">
                        </template>
                        <template x-if="!tool.img">
                            <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </template>
                        
                        <!-- Ponto luminoso indicador de imagem disponível -->
                        <template x-if="tool.img">
                            <span class="absolute bottom-1 right-1 w-2 h-2 bg-green-500 rounded-full border border-latam-surface shadow-[0_0_6px_rgba(34,197,94,0.8)]"></span>
                        </template>

                        <!-- Ponto de Destaque Especial -->
                        <template x-if="tool.special">
                            <span class="absolute top-1 right-1 w-2 h-2 bg-latam-pink rounded-full border border-latam-surface shadow-[0_0_8px_rgba(227,0,79,0.8)]"></span>
                        </template>
                    </div>

                    <!-- Dados Principais e Tutorial -->
                    <div class="flex-1 min-w-0 py-1 flex flex-col items-start">
                        <div class="flex items-center gap-2 mb-1.5 w-full">
                            <h3 class="text-base font-bold text-gray-100 truncate tracking-wide" x-text="tool.name"></h3>
                            <template x-if="tool.special">
                                <span class="bg-gradient-to-r from-latam-purple to-latam-pink text-white text-[9px] px-2 py-0.5 rounded-full font-bold uppercase tracking-widest shadow-sm flex-shrink-0">Especial</span>
                            </template>
                        </div>
                        <span class="inline-block bg-latam-purple/10 text-latam-purple border border-latam-purple/20 text-xs px-2.5 py-1 rounded-md font-mono font-medium shadow-inner" x-text="tool.code"></span>
                        
                        <!-- Botão Inteligente Tutorial MDM (Renderização Condicional) -->
                        <template x-if="tool.tutorial">
                            <a :href="tool.tutorial" target="_blank" @click.stop class="mt-2 inline-flex items-center gap-1.5 bg-latam-purple/10 border border-latam-purple/30 hover:bg-latam-purple/20 hover:border-latam-purple/50 text-latam-pink hover:text-white text-[10px] uppercase font-bold tracking-widest px-2.5 py-1 rounded-full transition-colors w-fit">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477-4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                                Tutorial MDM
                            </a>
                        </template>
                    </div>

                    <!-- Localização Alinhada à Direita -->
                    <div class="sm:text-right flex flex-col sm:items-end justify-center py-1 border-t sm:border-t-0 border-latam-border mt-2 sm:mt-0 pt-3 sm:pt-0">
                        <div class="flex items-center gap-1.5 justify-start sm:justify-end text-sm font-medium text-gray-400">
                            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                            <span class="capitalize" x-text="tool.loc"></span>
                        </div>
                        <div class="flex items-center gap-1.5 justify-start sm:justify-end mt-1 text-xs text-gray-500 font-mono">
                            <svg class="w-3 h-3 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            <span x-text="tool.sub"></span>
                        </div>
                    </div>

                </div>
            </template>
        </div>

        <!-- Tela Vazia (Busca sem resultados) -->
        <div x-cloak x-show="!isLoading && isSearching && searchResults.length === 0" class="text-center py-24 glass-panel rounded-2xl mt-6">
            <div class="w-16 h-16 mx-auto bg-latam-bg rounded-full flex items-center justify-center border border-latam-border mb-4">
                <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <h3 class="text-lg font-bold text-gray-300 tracking-wide">Sem resultados</h3>
            <p class="text-gray-500 text-sm mt-1">Nenhuma ferramenta corresponde à sua busca.</p>
        </div>

    </div>

    <!-- Lightbox Modal para Expansão da Imagem -->
    <div x-cloak x-show="isModalOpen" 
         @keydown.escape.window="closeImageModal()"
         class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4 bg-black/95 backdrop-blur-md transition-opacity duration-300"
         x-transition>
        
        <!-- Botão de Fechar Superior -->
        <button @click="closeImageModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white bg-latam-surface/80 p-3 rounded-full border border-latam-border backdrop-blur transition-all z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <!-- Container Centralizado da Imagem -->
        <div class="max-w-4xl max-h-[80vh] w-full flex flex-col items-center justify-center relative" @click.away="closeImageModal()">
            <img :src="activeImg" class="max-w-full max-h-[75vh] object-contain rounded-2xl border border-latam-border bg-latam-surface shadow-2xl p-2 mix-blend-screen">
            
            <!-- Legenda Flutuante Inferior -->
            <div class="mt-4 text-center px-4 py-2 bg-latam-surface/90 border border-latam-border rounded-full shadow-lg backdrop-blur">
                <span class="text-sm font-bold text-white tracking-wide" x-text="activeImgName"></span>
            </div>
        </div>
    </div>

    <!-- Script de Processamento e Sincronismo (Motor Alpine blindado contra ghost filters) -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('setupApp', () => ({
                toolsList: [],
                isLoading: true,
                searchQuery: '',
                level: 0,
                selectedCat: null,
                selectedLoc: null,
                selectedSub: null,
                activeCheck: null, // Controle do Kit/Procedimento

                // Estado do Modal de Zoom
                isModalOpen: false,
                activeImg: '',
                activeImgName: '',

                async init() {
                    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRHBw7M7f58VdQOb22lLEl6759ApiWB0fFHdqU1I8p45seWfxR7C-_X5tBGmTw4-ErnJaurfch2v3Bw/pub?gid=1418929880&single=true&output=csv';
                    try {
                        const response = await fetch(csvUrl);
                        if (!response.ok) throw new Error("Erro de rede ao carregar a planilha.");
                        const csvText = await response.text();
                        this.parsePlanilha(csvText);
                    } catch (erro) {
                        console.error("Erro:", erro);
                    } finally {
                        this.isLoading = false;
                    }
                },

                parsePlanilha(csvText) {
                    const linhas = csvText.split(/\r?\n/);
                    const ferramentas = [];
                    // Regex blindado para ignorar vírgulas que estejam dentro de aspas duplas
                    const regexCSV = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                    
                    for (let i = 1; i < linhas.length; i++) {
                        if (!linhas[i].trim()) continue;
                        const colunas = linhas[i].split(regexCSV).map(c => c.replace(/^"|"$/g, '').trim());
                        
                        const catRaw = colunas[2] ? colunas[2] : '';
                        const locRaw = colunas[3] ? colunas[3] : '';
                        const subRaw = colunas[4] ? colunas[4] : '';
                        
                        // Mapeamento EXATO corrigido conforme a sua planilha (Coluna H e I):
                        // [5] = Link Imagem (F)
                        // [6] = Especial (G)
                        // [7] = Check (H)
                        // [8] = Link Tutorial (I)
                        const checkRaw = colunas[7] ? colunas[7] : '';
                        const tutorialRaw = colunas[8] ? colunas[8] : '';
                        
                        // Permite múltiplos checks separados por vírgula na mesma célula
                        const checksArray = checkRaw.split(',').map(c => c.trim()).filter(Boolean);
                        
                        ferramentas.push({
                            id: i,
                            name: colunas[0] ? colunas[0] : 'N/A',
                            code: colunas[1] ? colunas[1] : 'N/A',
                            cat: catRaw !== '' ? catRaw.toLowerCase() : 'Sem Categoria',
                            loc: locRaw !== '' ? locRaw : 'Sem Móvel',
                            sub: (subRaw !== '' && subRaw.toUpperCase() !== 'N/A') ? subRaw : 'Sem Divisão',
                            img: colunas[5] ? colunas[5] : '',
                            special: colunas[6] && colunas[6].toUpperCase() === 'VERDADEIRO', // Agora lê a coluna G corretamente
                            checks: checksArray, // Agora lê a coluna H corretamente
                            tutorial: tutorialRaw !== '' ? tutorialRaw : null // Agora lê a coluna I corretamente
                        });
                    }
                    this.toolsList = ferramentas;
                },

                // Navegação Clássica Segura (Evita as "gavetas fantasmas")
                goToLevel(targetLevel, cat = null, loc = null, sub = null) {
                    this.searchQuery = ''; 
                    this.level = targetLevel;
                    this.selectedCat = cat;
                    this.selectedLoc = loc;
                    this.selectedSub = sub;
                    this.activeCheck = null; // Reseta a visão de procedimento se voltar pra navegação normal
                },

                // Navegação Específica para Kits/Checks
                goToCheck(checkName) {
                    this.searchQuery = '';
                    this.activeCheck = checkName;
                    this.level = 'check_view';
                },

                // Controles do Modal de Imagem
                openImageModal(imgUrl, toolName) {
                    this.activeImg = imgUrl;
                    this.activeImgName = toolName;
                    this.isModalOpen = true;
                },

                closeImageModal() {
                    this.isModalOpen = false;
                    this.activeImg = '';
                    this.activeImgName = '';
                },

                // Computed Properties (Getters Dinâmicos)
                get isSearching() { return this.searchQuery.trim().length > 0; },
                get searchResults() {
                    if (!this.isSearching) return [];
                    const query = this.searchQuery.toLowerCase();
                    return this.toolsList.filter(t => t.name.toLowerCase().includes(query) || t.code.toLowerCase().includes(query));
                },
                get categories() { return [...new Set(this.toolsList.map(t => t.cat))].filter(Boolean).sort(); },
                get locations() { return [...new Set(this.toolsList.filter(t => t.cat === this.selectedCat).map(t => t.loc))].filter(Boolean).sort(); },
                get subLocations() { return [...new Set(this.toolsList.filter(t => t.cat === this.selectedCat && t.loc === this.selectedLoc).map(t => t.sub))].filter(Boolean).sort(); },
                get toolsInSubLocation() { return this.toolsList.filter(t => t.cat === this.selectedCat && t.loc === this.selectedLoc && t.sub === this.selectedSub); },
                
                // Retorna lista única de todos os Procedimentos (Checks) encontrados na planilha
                get uniqueChecks() { 
                    const allChecks = this.toolsList.flatMap(t => t.checks);
                    return [...new Set(allChecks)].sort();
                },
                
                // Retorna as ferramentas que pertencem ao Procedimento (Check) selecionado
                get toolsInCheck() {
                    if (!this.activeCheck) return [];
                    return this.toolsList.filter(t => t.checks.includes(this.activeCheck));
                }
            }));
        });
    </script>
</body>
</html>
