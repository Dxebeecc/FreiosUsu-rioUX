<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo de Ferramentas</title>
    
    <!-- Tailwind CSS (Framework de estilo direto no HTML para não precisar de arquivos separados) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js (O motor do nosso App) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        /* Estilização da barra de rolagem e prevenção de flashes na tela (x-cloak) */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased" x-data="setupApp()">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Cabeçalho e Barra de Pesquisa -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white">Acervo de Ferramentas</h1>
                <p class="text-gray-400 mt-1">Gestão customizada de fluxos e inventário</p>
            </div>
            
            <div class="relative w-full md:w-96 flex items-center">
                <input type="text" x-model="searchQuery" placeholder="Buscar por nome ou código..." 
                       class="w-full bg-gray-800 border border-gray-700 rounded-lg py-3 px-4 text-white placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all shadow-sm">
                <!-- Ícone de limpar busca -->
                <button x-show="searchQuery !== ''" @click="searchQuery = ''" class="absolute right-3 text-gray-400 hover:text-white">
                    ✕
                </button>
            </div>
        </header>

        <!-- Abas de Navegação -->
        <nav class="flex space-x-2 md:space-x-4 mb-8 overflow-x-auto pb-2 border-b border-gray-800 scrollbar-hide">
            <button @click="selectedCategory = 'todas'" :class="selectedCategory === 'todas' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'" class="px-5 py-2.5 rounded-lg font-medium transition-all whitespace-nowrap">Tudo</button>
            <button @click="selectedCategory = 'caixas'" :class="selectedCategory === 'caixas' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'" class="px-5 py-2.5 rounded-lg font-medium transition-all whitespace-nowrap">Caixas</button>
            <button @click="selectedCategory = 'armarios'" :class="selectedCategory === 'armarios' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'" class="px-5 py-2.5 rounded-lg font-medium transition-all whitespace-nowrap">Armários</button>
            <button @click="selectedCategory = 'carros'" :class="selectedCategory === 'carros' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'" class="px-5 py-2.5 rounded-lg font-medium transition-all whitespace-nowrap">Carros</button>
        </nav>

        <!-- Loading / Tela de Carregamento -->
        <div x-show="isLoading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
            <p class="text-gray-400 text-lg animate-pulse">Sincronizando com a nuvem...</p>
        </div>

        <!-- Galeria Principal -->
        <div x-cloak x-show="!isLoading" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            
            <!-- Loop iterando a galeria de forma segura usando um ID único (:key="tool.id") -->
            <template x-for="tool in filteredTools" :key="tool.id">
                <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 shadow-md hover:border-blue-500 hover:shadow-lg hover:-translate-y-1 transform transition-all duration-200 flex flex-col h-full group">
                    
                    <!-- Imagem da Ferramenta -->
                    <div class="h-48 bg-gray-900 flex items-center justify-center relative border-b border-gray-700">
                        <template x-if="tool.img">
                            <img :src="tool.img" :alt="tool.name" class="w-full h-full object-cover group-hover:opacity-90 transition-opacity">
                        </template>
                        <template x-if="!tool.img">
                            <div class="flex flex-col items-center text-gray-600">
                                <svg class="w-10 h-10 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <span class="text-sm font-medium">Sem imagem</span>
                            </div>
                        </template>
                        
                        <!-- Tag "SPECIAL" para as ferramentas marcadas como VERDADEIRO -->
                        <template x-if="tool.special">
                            <span class="absolute top-3 right-3 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded shadow-md uppercase tracking-wider">Special</span>
                        </template>
                    </div>

                    <!-- Dados da Ferramenta -->
                    <div class="p-5 flex-grow flex flex-col">
                        <h3 class="text-lg font-bold text-white mb-1 leading-tight" x-text="tool.name"></h3>
                        <p class="text-blue-400 text-sm font-mono mb-4 bg-blue-900/20 inline-block self-start px-2 py-0.5 rounded" x-text="tool.code"></p>
                        
                        <!-- Localização (Gavetas, Prateleiras, etc) -->
                        <div class="mt-auto pt-3 border-t border-gray-700 flex items-start text-sm text-gray-400">
                            <svg class="w-4 h-4 mr-2 mt-0.5 flex-shrink-0 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            <span class="leading-tight" x-text="tool.loc + (tool.sub && tool.sub !== 'N/A' && tool.sub !== '' ? ' • ' + tool.sub : '')"></span>
                        </div>
                    </div>

                </div>
            </template>
        </div>

        <!-- Mensagem caso a busca ou a aba não tenha resultados -->
        <div x-cloak x-show="!isLoading && filteredTools.length === 0" class="text-center py-20 bg-gray-800 rounded-xl border border-gray-700 mt-6 shadow-sm">
            <svg class="w-16 h-16 text-gray-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h3 class="text-xl font-medium text-gray-300">Nenhuma ferramenta encontrada</h3>
            <p class="text-gray-500 mt-2">Tente buscar por um termo diferente ou mude de aba.</p>
        </div>

    </div>

    <!-- O Cérebro do Aplicativo (Sincronização com o Google Sheets) -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('setupApp', () => ({
                toolsList: [],
                isLoading: true,
                searchQuery: '',
                selectedCategory: 'todas', 

                async init() {
                    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRHBw7M7f58VdQOb22lLEl6759ApiWB0fFHdqU1I8p45seWfxR7C-_X5tBGmTw4-ErnJaurfch2v3Bw/pub?gid=1418929880&single=true&output=csv';
                    
                    try {
                        const response = await fetch(csvUrl);
                        if (!response.ok) throw new Error("Falha na requisição da rede.");
                        const csvText = await response.text();
                        this.parsePlanilha(csvText);
                    } catch (erro) {
                        console.error("Erro ao puxar a planilha:", erro);
                        alert("Não foi possível conectar ao banco de ferramentas. Verifique sua conexão.");
                    } finally {
                        this.isLoading = false;
                    }
                },

                parsePlanilha(csvText) {
                    const linhas = csvText.split(/\r?\n/);
                    const ferramentas = [];
                    
                    for (let i = 1; i < linhas.length; i++) {
                        if (!linhas[i].trim()) continue;
                        
                        // Divide usando Expressão Regular para não quebrar caso haja vírgulas dentro do texto da planilha
                        const colunas = linhas[i].split(',');
                        
                        ferramentas.push({
                            id: i, // ID único gerado a partir do número da linha
                            name: colunas[0] ? colunas[0].trim() : 'N/A',
                            code: colunas[1] ? colunas[1].trim() : 'N/A',
                            cat: colunas[2] ? colunas[2].trim().toLowerCase() : '',
                            loc: colunas[3] ? colunas[3].trim() : '',
                            sub: colunas[4] ? colunas[4].trim() : '',
                            img: colunas[5] ? colunas[5].trim() : '',
                            special: colunas[6] && colunas[6].trim().toUpperCase() === 'VERDADEIRO'
                        });
                    }
                    this.toolsList = ferramentas;
                },

                get filteredTools() {
                    return this.toolsList.filter(tool => {
                        const matchCategory = this.selectedCategory === 'todas' || tool.cat === this.selectedCategory;
                        const matchSearch = tool.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                                            tool.code.toLowerCase().includes(this.searchQuery.toLowerCase());
                        return matchCategory && matchSearch;
                    });
                }
            }));
        });
    </script>
</body>
</html>
