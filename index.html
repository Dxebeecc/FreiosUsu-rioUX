<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acervo de Ferramentas Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        latam: {
                            blue: '#1B1464',
                            purple: '#7B2068',
                            pink: '#E3004F',
                            bg: '#0A0F1C',
                            surface: '#131A2D',
                            border: '#232D45'
                        }
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0A0F1C; }
        ::-webkit-scrollbar-thumb { background: #232D45; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #7B2068; }
        [x-cloak] { display: none !important; }
        .glass-panel { background: rgba(19, 26, 45, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tile-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .tile-hover:hover { transform: translateY(-2px); border-color: #7B2068; background-color: rgba(35, 45, 69, 0.8); }
        .list-item-hover { transition: all 0.2s ease; }
        .list-item-hover:hover { background-color: rgba(255, 255, 255, 0.03); border-color: #7B2068; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-latam-bg text-gray-200 font-sans antialiased min-h-screen flex flex-col selection:bg-latam-pink selection:text-white pb-24" x-data="setupApp()">

    <header class="glass-panel sticky top-0 z-40 border-b border-latam-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-latam-blue via-latam-purple to-latam-pink flex items-center justify-center shadow-lg shadow-latam-purple/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wide">Acervo de Ferramentas</h1>
                    <p class="text-[10px] uppercase tracking-widest text-gray-400 font-semibold bg-clip-text text-transparent bg-gradient-to-r from-latam-purple to-latam-pink truncate max-w-[220px]" x-text="isCustomSheet ? 'Banco de Dados Customizado' : 'Oficina: Rodas e Freios'"></p>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row items-center gap-2 w-full md:w-auto">
                <input type="file" x-ref="jsonUpload" accept=".json" class="hidden" @change="loadImportedKit">
                <button @click="$refs.jsonUpload.click()" class="w-full sm:w-auto flex items-center justify-center gap-2 border border-latam-border hover:border-latam-purple bg-latam-surface text-gray-300 px-4 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all duration-300">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Carregar .JSON
                </button>

                <button @click="toggleBuilderMode()" :class="builderMode ? 'bg-latam-pink text-white border-latam-pink shadow-[0_0_15px_rgba(227,0,79,0.4)]' : 'bg-latam-surface text-latam-pink border-latam-border hover:border-latam-pink/50'" class="w-full sm:w-auto flex items-center justify-center gap-2 border px-4 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all duration-300">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    <span x-text="builderMode ? 'Cancelar Criação' : 'Criar Customizado'"></span>
                </button>

                <div class="relative w-full md:w-[280px]">
                    <input type="text" x-model="searchQuery" placeholder="Buscar P/N..." class="w-full bg-latam-bg border border-latam-border rounded-full py-2.5 px-5 pl-11 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-latam-purple focus:ring-1 focus:ring-latam-purple transition-all">
                    <svg class="w-4 h-4 absolute left-4 top-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <button x-show="isSearching" @click="searchQuery = ''" class="absolute right-2 top-2 text-gray-400 hover:text-white bg-latam-surface rounded-full p-1.5 transition-colors"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 w-full flex-grow">
        <div x-cloak x-show="!isLoading && !isSearching" class="mb-6 flex items-center space-x-1 overflow-x-auto pb-2 scrollbar-hide text-xs font-semibold uppercase tracking-wider">
            <button @click="goToLevel(0)" class="flex items-center px-3 py-1.5 rounded-full bg-latam-surface border border-latam-border text-gray-400 hover:text-white hover:border-latam-purple transition-colors whitespace-nowrap">Início</button>
            <template x-if="selectedCat">
                <div class="flex items-center">
                    <svg class="w-4 h-4 text-gray-600 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <button @click="goToLevel(1, selectedCat)" class="px-3 py-1.5 rounded-full bg-latam-surface border border-latam-border text-gray-400 hover:text-white hover:border-latam-purple transition-colors whitespace-nowrap" x-text="selectedCat"></button>
                </div>
            </template>
            <template x-if="selectedLoc">
                <div class="flex items-center">
                    <svg class="w-4 h-4 text-gray-600 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <button @click="goToLevel(2, selectedCat, selectedLoc)" class="px-3 py-1.5 rounded-full bg-latam-surface border border-latam-border text-gray-400 hover:text-white hover:border-latam-purple transition-colors whitespace-nowrap" x-text="selectedLoc"></button>
                </div>
            </template>
            <template x-if="selectedSub">
                <div class="flex items-center">
                    <svg class="w-4 h-4 text-gray-600 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <span class="px-3 py-1.5 rounded-full bg-gradient-to-r from-latam-purple/20 to-latam-pink/20 border border-latam-pink/30 text-latam-pink whitespace-nowrap" x-text="selectedSub"></span>
                </div>
            </template>
            <template x-if="activeCheck">
                <div class="flex items-center">
                    <svg class="w-4 h-4 text-gray-600 mx-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    <span class="px-3 py-1.5 rounded-full bg-gradient-to-r from-latam-purple/20 to-latam-pink/20 border border-latam-pink/30 text-white whitespace-nowrap flex items-center gap-1.5"><span class="font-bold text-latam-pink" x-text="activeCheck"></span></span>
                </div>
            </template>
        </div>

        <div x-show="isLoading" class="flex flex-col items-center justify-center py-32">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-latam-pink mb-4"></div>
            <p class="text-gray-400 text-sm uppercase tracking-widest font-semibold animate-pulse">Sincronizando Banco de Dados...</p>
        </div>

        <!-- CONTEÚDO CATEGORIAS -->
        <div x-cloak x-show="!isLoading && !isSearching && level === 0">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 pl-1">Explorar Inventário</h3>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mb-8">
                <template x-for="cat in categories" :key="cat">
                    <div @click="goToLevel(1, cat)" class="tile-hover glass-panel rounded-2xl p-4 flex items-center gap-4 group">
                        <div class="p-3 rounded-xl bg-latam-bg border border-latam-border text-gray-400 group-hover:text-latam-pink"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg></div>
                        <h2 class="text-sm font-bold text-gray-200 capitalize truncate" x-text="cat"></h2>
                    </div>
                </template>
            </div>
            
            <template x-if="uniqueChecks.length > 0">
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 pl-1">Kits por Procedimento</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        <template x-for="check in uniqueChecks" :key="check">
                            <div @click="goToCheck(check)" class="tile-hover glass-panel rounded-2xl p-4 flex items-center gap-4 group border border-latam-purple/25 relative overflow-hidden">
                                <div class="absolute left-0 top-0 bottom-0 w-1 bg-gradient-to-b from-latam-purple to-latam-pink"></div>
                                <h2 class="text-sm font-bold text-gray-100 truncate" x-text="check"></h2>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <!-- NÍVEL 1: MÓVEIS -->
        <div x-cloak x-show="!isLoading && !isSearching && level === 1" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <template x-for="loc in locations" :key="loc">
                <div @click="goToLevel(2, selectedCat, loc)" class="tile-hover glass-panel rounded-2xl p-4 flex items-center gap-4 group"><h2 class="text-sm font-bold text-gray-200 truncate" x-text="loc"></h2></div>
            </template>
        </div>

        <!-- NÍVEL 2: GAVETAS -->
        <div x-cloak x-show="!isLoading && !isSearching && level === 2" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <template x-for="sub in subLocations" :key="sub">
                <div @click="goToLevel(3, selectedCat, selectedLoc, sub)" class="tile-hover glass-panel rounded-2xl p-4 flex items-center gap-4 group"><h2 class="text-sm font-bold text-gray-200 truncate" x-text="sub"></h2></div>
            </template>
        </div>

        <!-- NÍVEL 3: FERRAMENTAS -->
        <div x-cloak x-show="!isLoading && (isSearching || level === 3 || level === 'check_view' || level === 'imported_view')" class="flex flex-col gap-3">
            <template x-for="tool in (isSearching ? searchResults : (level === 'check_view' ? toolsInCheck : (level === 'imported_view' ? toolsInImportedKit : toolsInSubLocation)))" :key="tool.id">
                <div class="list-item-hover glass-panel rounded-2xl p-3 flex flex-col sm:flex-row sm:items-center gap-4 border border-latam-border relative overflow-hidden group">
                    <div @click="tool.img ? openImageModal(tool.img, tool.name) : null" class="w-16 h-16 sm:w-20 sm:h-20 flex-shrink-0 bg-latam-bg rounded-xl overflow-hidden flex items-center justify-center border border-latam-border relative">
                        <img x-show="tool.img" :src="tool.img" class="w-full h-full object-contain p-1 mix-blend-screen">
                        <svg x-show="!tool.img" class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    </div>
                    <div class="flex-1 min-w-0 py-1">
                        <h3 class="text-base font-bold text-gray-100 truncate" x-text="tool.name"></h3>
                        <span class="inline-block bg-latam-purple/10 text-latam-purple border border-latam-purple/20 text-xs px-2.5 py-1 rounded-md font-mono mt-1" x-text="tool.code"></span>
                    </div>
                    <div class="sm:text-right text-xs text-gray-500 font-mono">
                        <div x-text="tool.loc"></div>
                        <div x-text="tool.sub" class="text-latam-pink font-bold mt-1"></div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Lightbox Zoom -->
    <div x-cloak x-show="isModalOpen" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <button @click="closeImageModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white bg-latam-surface p-3 rounded-full">X</button>
        <img :src="activeImg" class="max-w-full max-h-[75vh] object-contain rounded-2xl bg-latam-surface shadow-2xl p-2 mix-blend-screen">
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('setupApp', () => ({
                toolsList: [],
                isLoading: true,
                searchQuery: '',
                level: 0,
                selectedCat: null,
                selectedLoc: null,
                selectedSub: null,
                activeCheck: null,
                isCustomSheet: false,
                isModalOpen: false,
                activeImg: '',

                async init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    const sheetId = urlParams.get('id');
                    let csvUrl = '';

                    if (!sheetId) {
                        // Link padrão de Rodas e Freios
                        csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRHBw7M7f58VdQOb22lLEl6759ApiWB0fFHdqU1I8p45seWfxR7C-_X5tBGmTw4-ErnJaurfch2v3Bw/pub?gid=1418929880&single=true&output=csv';
                        this.isCustomSheet = false;
                    } else {
                        // Roteamento Direto por ID (Pega a primeira aba da nova planilha criada)
                        csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId.trim()}/export?format=csv`;
                        this.isCustomSheet = true;
                    }

                    try {
                        const response = await fetch(csvUrl);
                        if (!response.ok) throw new Error();
                        const csvText = await response.text();
                        this.parsePlanilha(csvText);
                    } catch (erro) {
                        console.error("Erro ao carregar banco de dados remoto.");
                    } finally {
                        this.isLoading = false;
                    }
                },

                parsePlanilha(csvText) {
                    const linhas = csvText.split(/\r?\n/);
                    const ferramentas = [];
                    const regexCSV = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                    for (let i = 1; i < linhas.length; i++) {
                        if (!linhas[i].trim()) continue;
                        const colunas = linhas[i].split(regexCSV).map(c => c.replace(/^"|"$/g, '').trim());
                        ferramentas.push({
                            id: i,
                            name: colunas[0] || 'N/A',
                            code: colunas[1] || 'N/A',
                            cat: (colunas[2] || 'Sem Categoria').toLowerCase(),
                            loc: colunas[3] || 'Sem Móvel',
                            sub: colunas[4] || 'Sem Divisão',
                            img: colunas[5] || '',
                            special: colunas[6] && colunas[6].toUpperCase() === 'VERDADEIRO',
                            checks: (colunas[7] || '').split(',').map(c => c.trim()).filter(Boolean)
                        });
                    }
                    this.toolsList = ferramentas;
                },
                goToLevel(lvl, cat=null, loc=null, sub=null) { this.level = lvl; this.selectedCat = cat; this.selectedLoc = loc; this.selectedSub = sub; this.searchQuery = ''; },
                goToCheck(chk) { this.activeCheck = chk; this.level = 'check_view'; },
                openImageModal(url, name) { this.activeImg = url; this.isModalOpen = true; },
                closeImageModal() { this.isModalOpen = false; },
                get isSearching() { return this.searchQuery.trim().length > 0; },
                get searchResults() { return this.toolsList.filter(t => t.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || t.code.toLowerCase().includes(this.searchQuery.toLowerCase())); },
                get categories() { return [...new Set(this.toolsList.map(t => t.cat))].filter(Boolean).sort(); },
                get locations() { return [...new Set(this.toolsList.filter(t => t.cat === this.selectedCat).map(t => t.loc))].filter(Boolean).sort(); },
                get subLocations() { return [...new Set(this.toolsList.filter(t => t.cat === this.selectedCat && t.loc === this.selectedLoc).map(t => t.sub))].filter(Boolean).sort(); },
                get toolsInSubLocation() { return this.toolsList.filter(t => t.cat === this.selectedCat && t.loc === this.selectedLoc && t.sub === this.selectedSub); },
                get uniqueChecks() { return [...new Set(this.toolsList.flatMap(t => t.checks))].sort(); },
                get toolsInCheck() { return this.toolsList.filter(t => t.checks.includes(this.activeCheck)); }
            }));
        });
    </script>
</body>
</html>
